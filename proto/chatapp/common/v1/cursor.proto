syntax = "proto3";

package chatapp.common.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/common/v1;commonv1";

message CursorRequest {
  string cursor = 1;
  int32 limit = 2;
}

message CursorResponse {
  string next_cursor = 1;
  string prev_cursor = 2;
  bool has_more_before = 3;
  bool has_more_after = 4;
}