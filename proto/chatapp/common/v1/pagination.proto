syntax = "proto3";

package chatapp.common.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/common/v1;commonv1";

message PageRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PageResponse {
  int32 page = 1;
  int32 page_size = 2;
  int64 total_count = 3;
  bool has_next = 4;
  bool has_prev = 5;
}                                                                                                                                                                             