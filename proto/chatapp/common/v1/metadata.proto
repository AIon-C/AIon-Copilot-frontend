syntax = "proto3";

package chatapp.common.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

// 監査用の共有メタ情報
message AuditMetadata {
  google.protobuf.Timestamp create_at = 1;
  google.protobuf.Timestamp update_at = 2;
  google.protobug.Timestamp deleted_at = 3;
  string created_by = 4;
  string updated_by = 4;
  string deleted_by = 4;
}