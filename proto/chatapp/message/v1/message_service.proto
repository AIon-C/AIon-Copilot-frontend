syntax = "proto3";

package chatapp.message.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/message/v1;messagev1";

import "google/protobuf/field_mask.proto";
import "chatapp/common/v1/cursor.proto";
import "chatapp/model/v1/message.proto";

message SendMessageRequest {
  string channel_id = 1;
  string content = 2;
  repeated string file_ids = 3;
  // generate key by client side
  string client_message_id = 4;
}

message SendMessageResponse {
  chatapp.model.v1.Message message = 1;
}

message ListMessageRequest {
  string channel_id = 1;
  chatapp.common.v1.CursorRequest page = 2;
}

message ListMessageResponse {
  repeated chatapp.model.v1.Message messages = 1;
  chatapp.common.v1.CursorResponse page = 2;
}

message GetMessageRequest {
  string message_id = 1;
}

message GetMessageResponse {
  chatapp.model.v1.Message message = 1;
}

message UpdateMessageRequest {
  chatapp.model.v1.Message message = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message UpdateMessageResponse {
  chatapp.model.v1.Message message = 1;
}

message DeleteMessageRequest {
  string message_id = 1;
}

message DeleteMessageResponse {
  chatapp.model.v1.Message message = 1;
}

service MessageService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  rpc UpdateMessage(UpdateMessageRequest) returns (UpdateMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
}
