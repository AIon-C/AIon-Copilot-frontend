syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "google/protobuf/timestamp.proto";

message File {
  string id = 1;
  string workspace_id = 2;
  string uploaded_by = 3;
  string file_name = 4;
  string file_key = 5;
  string content_type = 6;
  int64 file_size = 7;
  google.protobuf.Timestamp created_at = 8;
}