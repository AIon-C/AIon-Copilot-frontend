syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "chatapp/common/v1/metadata.proto";

message Channel {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string description = 4;
  string created_by = 5;
  chatapp.common.v1.AuditMetadata metadata = 6;
}