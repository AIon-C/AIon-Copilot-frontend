syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "google/protobuf/timestamp.proto";

message ChannelMember {
  string id = 1;
  string channel_id = 2;
  string user_id = 3;
  google.protobuf.Timestamp last_read_at = 4;
  google.protobuf.Timestamp joined_at = 5;
}